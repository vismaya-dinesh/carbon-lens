<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarbonLens — Personal Carbon Footprint Tracker</title>
  <!-- Google Fonts Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Design Tokens & Theme Setup */
    :root {
      --font-display: 'Outfit', sans-serif;
      --font-sans: 'Inter', sans-serif;
      
      --bg-gradient-start: #0b0f19;
      --bg-gradient-end: #172033;
      --card-bg: rgba(22, 30, 49, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-hover-border: rgba(255, 255, 255, 0.16);
      
      /* Category Colors */
      --color-transport: #38bdf8;       /* Sky Blue */
      --color-food: #fb7185;            /* Rose/Coral */
      --color-energy: #fbbf24;          /* Amber */
      --color-shopping: #c084fc;        /* Violet */
      
      /* Status Levels */
      --color-low: #10b981;             /* Emerald Green */
      --color-medium: #f59e0b;          /* Amber Yellow */
      --color-high: #ef4444;            /* Coral Red */
      
      /* Text Colors */
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      
      --focus-ring: 2px solid #38bdf8;
    }
    
    /* Global Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: var(--font-sans);
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
    }
    
    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    /* Accessibility Focus Style */
    *:focus-visible {
      outline: var(--focus-ring);
      outline-offset: 4px;
    }

    /* Glassmorphic Container */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .glass-card:hover {
      border-color: var(--card-hover-border);
    }
    
    .interactive-card {
      cursor: pointer;
    }
    
    .interactive-card:hover {
      transform: translateY(-2px);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #38bdf8, #0369a1);
      color: white;
      box-shadow: 0 4px 14px rgba(56, 189, 248, 0.3);
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    /* Form Inputs */
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-label {
      display: block;
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }
    
    .form-input, .form-select {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      transition: border-color 0.2s ease;
    }
    
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
    }
    
    /* Layout Grid */
    .app-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }
    
    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .header-title {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f8fafc, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .grid-layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 1100px) {
      .grid-layout {
        grid-template-columns: 1fr 1fr;
      }
    }
    
    @media (max-width: 768px) {
      .grid-layout {
        grid-template-columns: 1fr;
      }
      .header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    /* Date Selector */
    .date-selector {
      display: flex;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 30px;
      padding: 4px;
      overflow-x: auto;
      max-width: 100%;
    }
    
    .date-pill {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: var(--font-display);
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
    }
    
    .date-pill.active {
      background: rgba(56, 189, 248, 0.15);
      color: #38bdf8;
      border: 1px solid rgba(56, 189, 248, 0.2);
    }
    
    .date-pill:hover:not(.active) {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.04);
    }

    /* Error & Warning Styles */
    .field-error {
      color: #fca5a5;
      font-size: 0.8rem;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .field-warning {
      color: #fde047;
      font-size: 0.8rem;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 12px;
      letter-spacing: 0.05em;
    }
    
    .badge-low {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    
    .badge-medium {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.2);
    }
    
    .badge-high {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* Onboarding Overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(11, 15, 25, 0.85);
      backdrop-filter: blur(20px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .overlay-content {
      width: 100%;
      max-width: 580px;
    }

    /* Tabs for Form */
    .tabs-header {
      display: flex;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 24px;
      gap: 8px;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 0.95rem;
      padding: 10px 16px;
      cursor: pointer;
      position: relative;
      transition: color 0.2s ease;
    }

    .tab-btn.active {
      color: var(--text-primary);
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: #38bdf8;
    }

    /* Animation Reductions */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-delay: 0s !important;
        animation-duration: 0s !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0s !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useState, useReducer, useMemo, useCallback, useEffect, useRef } from 'https://esm.sh/react@19?dev';
    import { createRoot } from 'https://esm.sh/react-dom@19/client?dev';

    // ==========================================
    // DATA LAYER: EMISSION FACTORS & METADATA
    // ==========================================

    /**
     * Emission factors defined in kg CO2e per unit.
     * Sources:
     * - Transport: UK DEFRA Greenhouse Gas Conversion Factors (2023)
     * - Food: Poore & Nemecek, Science (2018) / Our World in Data
     * - Energy: EPA eGRID (2023) / US Energy Information Administration
     * - Shopping: Ellen MacArthur Foundation / UNEP Lifecycle Analysis
     */
    const EMISSION_FACTORS = {
      transport: {
        car: 0.210,      // kg CO2e / km (Petrol/diesel medium car average)
        flight: 0.255,   // kg CO2e / km (Short-haul passenger flight average)
        transit: 0.089,  // kg CO2e / km (Local bus/train passenger average)
        cycling: 0.000,  // kg CO2e / km (Active travel / zero emission)
      },
      food: {
        beef: 6.610,     // kg CO2e / serving (Beef meal serving, approx 150g)
        chicken: 1.840,  // kg CO2e / serving (Poultry meal serving, approx 150g)
        vegetarian: 0.610, // kg CO2e / serving (Vegetarian average meal)
        vegan: 0.390,    // kg CO2e / serving (Vegan/plant-based average meal)
      },
      energy: {
        electricity: 0.233, // kg CO2e / kWh (US average electricity grid intensity)
        gas: 2.040,      // kg CO2e / therm (Natural gas combustion)
      },
      shopping: {
        clothing: 10.000, // kg CO2e / new item (Average clothing item production)
        electronics: 70.000, // kg CO2e / new item (Smartphone/tablet manufacturing average)
        secondhand: 1.500, // kg CO2e / item (Used/secondhand processing & shipping)
      }
    };

    /**
     * Unrealistic caps to prevent extreme outliers in calculations.
     */
    const INPUT_LIMITS = {
      transport: { max: 2000, label: 'km' },
      food: { max: 10, label: 'meals' },
      energy_electricity: { max: 200, label: 'kWh' },
      energy_gas: { max: 50, label: 'therms' },
      shopping: { max: 20, label: 'items' }
    };

    /**
     * Global daily benchmarks in kg CO2e.
     * Source: Global Average targets from IPCC and Paris Agreement trajectory.
     */
    const GLOBAL_BENCHMARKS = {
      total: 6.30,       // Recommended daily budget target
      transport: 2.50,   // Global daily average for transport
      food: 2.00,        // Global daily average for food
      energy: 1.20,      // Global daily average for home energy
      shopping: 0.60,    // Global daily average for shopping
    };

    /**
     * Reduction tips registry used by the Insights Engine.
     */
    const REDUCTION_TIPS = {
      transport: [
        {
          action: "Swap short car trips for Cycling/Walking",
          saving: 1.05,
          difficulty: "Easy",
          explanation: "Trips under 5km are highly inefficient for cars. Active travel emits 0 kg CO2e."
        },
        {
          action: "Utilize Public Transit instead of driving",
          saving: 3.63,
          difficulty: "Medium",
          explanation: "Taking the train or bus cuts transportation emissions per km by over 60%."
        },
        {
          action: "Substitute high-speed train for short flight",
          saving: 120.00,
          difficulty: "Hard",
          explanation: "Aviation has the highest warming effect per hour; regional rail is significantly cleaner."
        }
      ],
      food: [
        {
          action: "Switch Beef meal to Chicken or Fish",
          saving: 4.77,
          difficulty: "Easy",
          explanation: "Poultry has roughly 70% lower emissions intensity than methane-heavy beef production."
        },
        {
          action: "Adopt a Vegetarian or Vegan diet day",
          saving: 6.00,
          difficulty: "Medium",
          explanation: "Swapping animal-based meals for plant-based ingredients reduces dietary emissions by 90%."
        },
        {
          action: "Plan meals to avoid household food waste",
          saving: 1.50,
          difficulty: "Easy",
          explanation: "Throwing away food releases methane in landfills. Planning purchases avoids decay emissions."
        }
      ],
      energy: [
        {
          action: "Lower heating by 2°C or raise cooling",
          saving: 1.80,
          difficulty: "Easy",
          explanation: "Adjusting thermostat settings slightly can cut heating and cooling power by 10%."
        },
        {
          action: "Unplug standby devices and use LEDs",
          saving: 0.50,
          difficulty: "Easy",
          explanation: "Vampire power draws account for 5% of household energy. LEDs reduce direct lighting draws."
        },
        {
          action: "Upgrade wall insulation or double glaze windows",
          saving: 4.20,
          difficulty: "Hard",
          explanation: "Better home thermal envelopes block temperature leaks, dropping furnace/AC duty cycles."
        }
      ],
      shopping: [
        {
          action: "Buy secondhand clothing or furniture",
          saving: 8.50,
          difficulty: "Easy",
          explanation: "Thrifting prevents new supply-chain processing emissions, requiring only transport/cleaning."
        },
        {
          action: "Repair or trade-in old electronics",
          saving: 68.50,
          difficulty: "Hard",
          explanation: "Manufacturing devices accounts for ~85% of their total carbon footprint; prolonging lifetime is key."
        },
        {
          action: "Invest in high-durability products",
          saving: 5.00,
          difficulty: "Medium",
          explanation: "Higher-quality items reduce the absolute purchase frequency, lowering overall lifecycle waste."
        }
      ]
    };

    // ==========================================
    // PURE EMISSION CALCULATION FUNCTIONS
    // ==========================================

    /** Calculates transport emissions based on mode and distance in km. */
    function calculateTransportEmissions(mode, km) {
      const num = Number(km);
      if (isNaN(num) || num < 0) return 0;
      if (num > 2000) {
        if (typeof window !== 'undefined') {
          window.transportWarning = true;
        }
        return 0;
      }
      const factor = EMISSION_FACTORS.transport[mode] || 0;
      return num * factor;
    }

    /** Calculates food emissions based on meal type and serving count. */
    function calculateFoodEmissions(mealType, count) {
      const num = Number(count);
      if (isNaN(num) || num < 0) return 0;
      const factor = EMISSION_FACTORS.food[mealType] || 0;
      return num * factor;
    }

    /** Calculates energy emissions based on type and amount. */
    function calculateEnergyEmissions(type, amount) {
      const num = Number(amount);
      if (isNaN(num) || num < 0) return 0;
      const factor = EMISSION_FACTORS.energy[type] || 0;
      return num * factor;
    }

    /** Calculates shopping emissions based on item type and count. */
    function calculateShoppingEmissions(itemType, count) {
      const num = Number(count);
      if (isNaN(num) || num < 0) return 0;
      const factor = EMISSION_FACTORS.shopping[itemType] || 0;
      return num * factor;
    }

    /** Calculates the daily total emissions from an array of activities. */
    function calculateDailyTotal(activities) {
      if (!Array.isArray(activities)) return 0;
      return activities.reduce((acc, curr) => {
        let val = 0;
        if (curr.emissions !== undefined && typeof curr.emissions === 'number') {
          val = curr.emissions;
        } else {
          const cat = curr.category || curr.type;
          if (cat === 'transport') {
            val = calculateTransportEmissions(curr.mode, curr.km);
          } else if (cat === 'food') {
            val = calculateFoodEmissions(curr.mealType, curr.count);
          } else if (cat === 'energy') {
            val = calculateEnergyEmissions(curr.energyType || curr.subtype || curr.mode || curr.type, curr.amount || curr.count || curr.quantity);
          } else if (cat === 'shopping') {
            val = calculateShoppingEmissions(curr.itemType, curr.count);
          }
        }
        return acc + val;
      }, 0);
    }

    /** Returns exactly 3 reduction tips sorted by saving descending. */
    function getReductionTips(activities) {
      const totals = { transport: 0, food: 0, energy: 0, shopping: 0 };
      if (Array.isArray(activities)) {
        activities.forEach(act => {
          const category = act.category || act.type;
          if (totals[category] !== undefined) {
            let emissions = act.emissions;
            if (emissions === undefined) {
              if (category === 'transport') {
                emissions = calculateTransportEmissions(act.mode, act.km);
              } else if (category === 'food') {
                emissions = calculateFoodEmissions(act.mealType, act.count);
              } else if (category === 'energy') {
                emissions = calculateEnergyEmissions(act.energyType || act.subtype || act.mode || act.type, act.amount || act.count || act.quantity);
              } else if (category === 'shopping') {
                emissions = calculateShoppingEmissions(act.itemType, act.count);
              }
            }
            if (typeof emissions === 'number' && !isNaN(emissions)) {
              totals[category] += emissions;
            }
          }
        });
      }

      let topCategory = 'food';
      let maxVal = -1;
      Object.entries(totals).forEach(([cat, val]) => {
        if (val > maxVal) {
          maxVal = val;
          topCategory = cat;
        }
      });

      const tips = [...(REDUCTION_TIPS[topCategory] || REDUCTION_TIPS.food)];
      tips.sort((a, b) => b.saving - a.saving);
      return tips.slice(0, 3);
    }

    // ==========================================
    // BROWSER TEST SUITE
    // ==========================================

    const TESTS = [
      // Emission calculation unit tests
      { name: "Car 100km = 21kg", fn: () => calculateTransportEmissions("car", 100) === 21 },
      { name: "Flight 500km = 127.5kg", fn: () => calculateTransportEmissions("flight", 500) === 127.5 },
      { name: "Cycling = 0kg", fn: () => calculateTransportEmissions("cycling", 999) === 0 },
      { name: "Beef meal = 6.61kg", fn: () => calculateFoodEmissions("beef", 1) === 6.61 },
      { name: "Vegan meal = 0.39kg", fn: () => calculateFoodEmissions("vegan", 1) === 0.39 },
      { name: "Electricity 10kWh = 2.33kg", fn: () => calculateEnergyEmissions("electricity", 10) === 2.33 },
      { name: "Shopping electronics = 70kg", fn: () => calculateShoppingEmissions("electronics", 1) === 70 },

      // Input validation tests
      { name: "Negative km returns 0", fn: () => calculateTransportEmissions("car", -10) === 0 },
      { name: "NaN input returns 0", fn: () => calculateTransportEmissions("car", NaN) === 0 },
      { name: "Over 2000km returns 0", fn: () => calculateTransportEmissions("car", 2001) === 0 },
      { name: "Zero meals returns 0", fn: () => calculateFoodEmissions("beef", 0) === 0 },

      // Daily total tests
      { name: "Empty activities total = 0", fn: () => calculateDailyTotal([]) === 0 },
      { name: "Daily total sums correctly", fn: () => {
        const acts = [{ type: "transport", mode: "car", km: 10 }, { type: "food", mealType: "beef", count: 1 }];
        return Math.abs(calculateDailyTotal(acts) - (2.1 + 6.61)) < 0.001;
      }},

      // Tips tests
      { name: "getReductionTips returns 3 items", fn: () => {
        const acts = [{ type: "food", mealType: "beef", count: 1 }];
        return getReductionTips(acts).length === 3;
      }},
      { name: "Tips sorted by saving descending", fn: () => {
        const acts = [{ type: "transport", mode: "car", km: 100 }];
        const tips = getReductionTips(acts);
        return tips[0].saving >= tips[1].saving && tips[1].saving >= tips[2].saving;
      }},
    ];

    function runTests() {
      const results = TESTS.map(t => {
        try { return { name: t.name, pass: t.fn() === true, error: null };
        } catch(e) { return { name: t.name, pass: false, error: e.message }; }
      });
      return results;
    }

    // ==========================================
    // STATE LAYER: REDUCER & UTILS
    // ==========================================

    const INITIAL_STATE = {
      profile: {
        country: 'United States',
        householdSize: 2,
        dietType: 'omnivore',
        transportMode: 'car',
        onboardingCompleted: false,
      },
      activities: [],
      dailyHistory: {}, // { YYYY-MM-DD: total_emissions }
    };

    /**
     * Check if a date string is within the last 7 rolling days.
     * @param {string} dateStr - The YYYY-MM-DD formatted date string.
     * @returns {boolean} True if the date is within 7 days.
     */
    function isWithinLast7Days(dateStr) {
      const date = new Date(dateStr);
      const today = new Date();
      today.setHours(0,0,0,0);
      date.setHours(0,0,0,0);
      
      const diffTime = today - date;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      return diffDays >= 0 && diffDays < 7;
    }

    /**
     * Check if a date string is within the last 14 rolling days.
     * Used to preserve enough daily totals for the 14-day sparkline.
     * @param {string} dateStr - The YYYY-MM-DD formatted date.
     * @returns {boolean} True if the date is within 14 days.
     */
    function isWithinLast14Days(dateStr) {
      const date = new Date(dateStr);
      const today = new Date();
      today.setHours(0,0,0,0);
      date.setHours(0,0,0,0);
      
      const diffTime = today - date;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      return diffDays >= 0 && diffDays < 14;
    }

    /**
     * Reducer handles core transitions for tracking activities, profile settings, and daily calculations.
     * @param {Object} state - The current application state.
     * @param {Object} action - Action details.
     * @returns {Object} The updated state.
     */
    function carbonReducer(state, action) {
      switch (action.type) {
        case 'COMPLETE_ONBOARDING': {
          const nextState = {
            ...state,
            profile: {
              ...state.profile,
              ...action.payload,
              onboardingCompleted: true,
            }
          };
          saveState(nextState);
          return nextState;
        }
        case 'ADD_ACTIVITY': {
          const updatedActivities = [action.payload, ...state.activities];
          
          // Re-calculate daily history for target date
          const date = action.payload.date;
          const dayEmissions = updatedActivities
            .filter(act => act.date === date)
            .reduce((acc, curr) => acc + curr.emissions, 0);

          const nextState = {
            ...state,
            activities: updatedActivities,
            dailyHistory: {
              ...state.dailyHistory,
              [date]: dayEmissions,
            }
          };
          saveState(nextState);
          return nextState;
        }
        case 'DELETE_ACTIVITY': {
          const updatedActivities = state.activities.filter(act => act.id !== action.payload);
          const targetAct = state.activities.find(act => act.id === action.payload);
          let nextHistory = { ...state.dailyHistory };
          
          if (targetAct) {
            const date = targetAct.date;
            const dayEmissions = updatedActivities
              .filter(act => act.date === date)
              .reduce((acc, curr) => acc + curr.emissions, 0);
            
            if (dayEmissions === 0) {
              delete nextHistory[date];
            } else {
              nextHistory[date] = dayEmissions;
            }
          }

          const nextState = {
            ...state,
            activities: updatedActivities,
            dailyHistory: nextHistory,
          };
          saveState(nextState);
          return nextState;
        }
        case 'RESET_ALL': {
          localStorage.removeItem('carbon_lens_state');
          return {
            ...INITIAL_STATE,
            profile: {
              ...INITIAL_STATE.profile,
              onboardingCompleted: false
            }
          };
        }
        case 'LOAD_STATE': {
          return action.payload;
        }
        default:
          return state;
      }
    }

    /**
     * Safely saves state to localStorage.
     * @param {Object} state - Current application state.
     */
    function saveState(state) {
      try {
        localStorage.setItem('carbon_lens_state', JSON.stringify(state));
      } catch (err) {
        console.warn('LocalStorage unavailable. Falling back to memory storage.', err);
      }
    }

    /**
     * Safely loads and filters state from localStorage on application start.
     * @returns {Object} The rehydrated and sanitized state.
     */
    function loadAndSanitizeState() {
      try {
        const saved = localStorage.getItem('carbon_lens_state');
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed) {
            // Apply 7-day auto-expiry of detailed activity logs
            if (Array.isArray(parsed.activities)) {
              parsed.activities = parsed.activities.filter(act => isWithinLast7Days(act.date));
            }
            // Apply 14-day auto-expiry of summarized daily totals
            if (parsed.dailyHistory) {
              const cleanHistory = {};
              Object.keys(parsed.dailyHistory).forEach(dateKey => {
                if (isWithinLast14Days(dateKey)) {
                  cleanHistory[dateKey] = parsed.dailyHistory[dateKey];
                }
              });
              parsed.dailyHistory = cleanHistory;
            }
            return parsed;
          }
        }
      } catch (err) {
        console.error('Failed to parse localStorage. Defaulting to initial state.', err);
      }
      return INITIAL_STATE;
    }

    /**
     * Sparkline chart comparison comparing daily emission totals.
     */
    function WeeklySparkline({ dailyHistory }) {
      const datesThisWeek = useMemo(() => {
        const dates = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          dates.push(d.toISOString().split('T')[0]);
        }
        return dates;
      }, []);

      const datesLastWeek = useMemo(() => {
        const dates = [];
        for (let i = 13; i >= 7; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          dates.push(d.toISOString().split('T')[0]);
        }
        return dates;
      }, []);

      const thisWeekData = useMemo(() => {
        return datesThisWeek.map(date => dailyHistory[date] || 0);
      }, [dailyHistory, datesThisWeek]);

      const lastWeekData = useMemo(() => {
        return datesLastWeek.map(date => dailyHistory[date] || 0);
      }, [dailyHistory, datesLastWeek]);

      const maxVal = useMemo(() => {
        const combined = [...thisWeekData, ...lastWeekData];
        const highest = Math.max(...combined);
        return highest > 0 ? highest * 1.15 : 10;
      }, [thisWeekData, lastWeekData]);

      const width = 240;
      const height = 64;
      const padding = 4;

      const getPointsPath = (data) => {
        return data.map((val, idx) => {
          const x = padding + (idx * ((width - (padding * 2)) / 6));
          const y = height - padding - ((val / maxVal) * (height - (padding * 2)));
          return { x, y };
        });
      };

      const thisWeekPoints = getPointsPath(thisWeekData);
      const lastWeekPoints = getPointsPath(lastWeekData);

      const thisWeekPath = thisWeekPoints.map((p, idx) => `${idx === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
      const lastWeekPath = lastWeekPoints.map((p, idx) => `${idx === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');

      // Path closure for gradient background
      const thisWeekAreaPath = thisWeekPoints.length > 0 
        ? `${thisWeekPath} L ${thisWeekPoints[thisWeekPoints.length - 1].x} ${height} L ${thisWeekPoints[0].x} ${height} Z` 
        : '';

      const thisWeekTotal = thisWeekData.reduce((acc, curr) => acc + curr, 0);
      const lastWeekTotal = lastWeekData.reduce((acc, curr) => acc + curr, 0);
      const deltaTotal = thisWeekTotal - lastWeekTotal;
      const improved = deltaTotal <= 0;

      return React.createElement(
        'div',
        { className: 'glass-card', style: { display: 'flex', flexDirection: 'column' } },
        React.createElement('h3', { style: { marginBottom: '12px', fontSize: '1.2rem' } }, 'Weekly Emission Trend'),
        React.createElement(
          'div',
          { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '16px' } },
          React.createElement(
            'div',
            { style: { display: 'flex', flexDirection: 'column' } },
            React.createElement('span', { style: { fontSize: '1.4rem', fontWeight: '800' } }, `${thisWeekTotal.toFixed(1)} kg`),
            React.createElement('span', { style: { fontSize: '0.75rem', color: 'var(--text-secondary)' } }, 'This rolling week total')
          ),
          React.createElement(
            'div',
            { 
              className: `badge badge-${improved ? 'low' : 'high'}`,
              style: { alignSelf: 'center' }
            },
            improved 
              ? `📉 -${Math.abs(deltaTotal).toFixed(1)} kg vs last week`
              : `📈 +${deltaTotal.toFixed(1)} kg vs last week`
          )
        ),
        React.createElement(
          'div',
          { style: { display: 'flex', justifyContent: 'center', width: '100%', marginBottom: '12px' } },
          React.createElement(
            'svg',
            { 
              width: '100%', 
              height: height, 
              viewBox: `0 0 ${width} ${height}`,
              preserveAspectRatio: 'none',
              role: 'img',
              'aria-label': `Weekly trend comparison chart. Current week total is ${thisWeekTotal.toFixed(1)} kg CO2e, last week was ${lastWeekTotal.toFixed(1)} kg CO2e.`
            },
            React.createElement(
              'defs',
              null,
              React.createElement(
                'linearGradient',
                { id: 'sparkGrad', x1: '0', y1: '0', x2: '0', y2: '1' },
                React.createElement('stop', { offset: '0%', stopColor: 'var(--color-transport)', stopOpacity: '0.35' }),
                React.createElement('stop', { offset: '100%', stopColor: 'var(--color-transport)', stopOpacity: '0' })
              )
            ),
            /* Last Week Line (Dashed) */
            React.createElement('path', {
              d: lastWeekPath,
              fill: 'none',
              stroke: 'rgba(255, 255, 255, 0.15)',
              strokeWidth: '1.5',
              strokeDasharray: '3,3',
              strokeLinecap: 'round',
              strokeLinejoin: 'round'
            }),
            /* This Week Area */
            React.createElement('path', {
              d: thisWeekAreaPath,
              fill: 'url(#sparkGrad)'
            }),
            /* This Week Line */
            React.createElement('path', {
              d: thisWeekPath,
              fill: 'none',
              stroke: 'var(--color-transport)',
              strokeWidth: '2.5',
              strokeLinecap: 'round',
              strokeLinejoin: 'round'
            }),
            /* Current Day Highlight Marker */

                { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '12px' } },
                React.createElement('span', { style: { fontWeight: '600', fontSize: '0.9rem', color: 'var(--text-primary)' } }, tip.action),
                React.createElement(
                  'span', 
                  { 
                    style: { 
                      fontSize: '0.7rem', 
                      color: diffColor, 
                      fontWeight: '700', 
                      textTransform: 'uppercase',
                      border: `1px solid ${diffColor}`,
                      padding: '2px 6px',
                      borderRadius: '4px',
                      whiteSpace: 'nowrap'
                    } 
                  }, 
                  tip.difficulty
                )
              ),
              React.createElement('p', { style: { fontSize: '0.8rem', color: 'var(--text-secondary)' } }, tip.explanation),
              React.createElement(
                'span', 
                { style: { fontSize: '0.75rem', color: 'var(--color-low)', fontWeight: '600', alignSelf: 'flex-start', marginTop: '4px' } },
                `Estimated saving: -${tip.saving.toFixed(1)} kg CO2e`
              )
            );
          })
        )
      );
    }

    /**
     * Interactive activity logging form.
     */
    function ActivityForm({ onAdd, selectedDate }) {
      const [activeTab, setActiveTab] = useState('transport');
      
      // Select fields depending on category
      const [type, setType] = useState('car');
      const [quantityStr, setQuantityStr] = useState('');
      const [note, setNote] = useState('');
      
      // Inline validation states
      const [error, setError] = useState('');
      const [warning, setWarning] = useState('');

      const handleTabChange = (tab) => {
        setActiveTab(tab);
        setError('');
        setWarning('');
        setQuantityStr('');
        setNote('');
        
        // Pick default types
        if (tab === 'transport') setType('car');
        if (tab === 'food') setType('beef');
        if (tab === 'energy') setType('electricity');
        if (tab === 'shopping') setType('clothing');
      };

      const handleQuantityChange = (e) => {
        const val = e.target.value;
        setQuantityStr(val);
        setError('');
        setWarning('');

        if (val === '') return;

        const num = parseFloat(val);
        if (isNaN(num) || num < 0) {
          setError('⚠️ Quantity must be a positive number.');
          return;
        }

        if (activeTab === 'transport' && num > 2000) {
          setWarning('⚠️ Warning: Transportation distance exceeds 2000 km.');
        } else {
          // Check against warning limits
          const limitKey = activeTab === 'energy' ? `${activeTab}_${type}` : activeTab;
          const limit = INPUT_LIMITS[limitKey];
          if (limit && num > limit.max) {
            setWarning(`⚠️ Note: Values above ${limit.max} ${limit.label} will be capped to preserve graph scaling.`);
          }
        }
      };

      const handleTypeChange = (e) => {
        const newType = e.target.value;
        setType(newType);
        setError('');
        setWarning('');
        
        // Re-evaluate limits with new type
        const num = parseFloat(quantityStr);
        if (!isNaN(num)) {
          if (activeTab === 'transport' && num > 2000) {
            setWarning('⚠️ Warning: Transportation distance exceeds 2000 km.');
          } else {
            const limitKey = activeTab === 'energy' ? `${activeTab}_${newType}` : activeTab;
            const limit = INPUT_LIMITS[limitKey];
            if (limit && num > limit.max) {
              setWarning(`⚠️ Note: Values above ${limit.max} ${limit.label} will be capped.`);
            }
          }
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        const num = parseFloat(quantityStr);
        if (isNaN(num) || num < 0 || quantityStr.trim() === '') {
          setError('⚠️ Please provide a valid quantity before logging.');
          return;
        }

        let computedEmissions = 0;
        let loggedQuantity = num;

        if (activeTab === 'transport') {
          computedEmissions = calculateTransportEmissions(type, num);
          if (num > 2000) {
            setWarning('⚠️ Warning: Transportation distance exceeds 2000 km.');
          }
        } else {
          // Apply caps for unrealistic inputs
          let finalQuantity = num;
          const limitKey = activeTab === 'energy' ? `${activeTab}_${type}` : activeTab;
          const limit = INPUT_LIMITS[limitKey];
          if (limit && num > limit.max) {
            finalQuantity = limit.max;
          }
          loggedQuantity = finalQuantity;

          if (activeTab === 'food') {
            computedEmissions = calculateFoodEmissions(type, finalQuantity);
          } else if (activeTab === 'energy') {
            computedEmissions = calculateEnergyEmissions(type, finalQuantity);
          } else if (activeTab === 'shopping') {
            computedEmissions = calculateShoppingEmissions(type, finalQuantity);
          }
        }

        onAdd({
          id: Date.now().toString(),
          date: selectedDate,
          category: activeTab,
          type,
          quantity: loggedQuantity,
          emissions: computedEmissions,
          note: note.trim()
        });

        // Reset fields
        setQuantityStr('');
        setNote('');
        setError('');
        if (activeTab !== 'transport' || num <= 2000) {
          setWarning('');
        }
      };

      return React.createElement(
        'div',
        { className: 'glass-card' },
        React.createElement('h3', { style: { marginBottom: '16px', fontSize: '1.2rem' } }, 'Log Activity'),
        
        /* Category Selector Tabs */
        React.createElement(
          'div',
          { className: 'tabs-header' },
          ['transport', 'food', 'energy', 'shopping'].map(tab => 
            React.createElement(
              'button',
              {
                key: tab,
                type: 'button',
                className: `tab-btn ${activeTab === tab ? 'active' : ''}`,
                onClick: () => handleTabChange(tab)
              },
              tab.charAt(0).toUpperCase() + tab.slice(1)
            )
          )
        ),

        React.createElement(
          'form',
          { onSubmit: handleSubmit },
          /* Category Type Dropdowns */
          React.createElement(
            'div',
            { className: 'form-group' },
            React.createElement('label', { className: 'form-label', htmlFor: 'act-type' }, 'Activity Subtype'),
            React.createElement(
              'select',
              {
                id: 'act-type',
                className: 'form-select',
                value: type,
                onChange: handleTypeChange
              },
              activeTab === 'transport' && [
                React.createElement('option', { key: 'car', value: 'car' }, `Car Commute (${EMISSION_FACTORS.transport.car} kg/km)`),
                React.createElement('option', { key: 'flight', value: 'flight' }, `Flight (${EMISSION_FACTORS.transport.flight} kg/km)`),
                React.createElement('option', { key: 'transit', value: 'transit' }, `Public Transit (${EMISSION_FACTORS.transport.transit} kg/km)`),
                React.createElement('option', { key: 'cycling', value: 'cycling' }, `Cycling/Walking (${EMISSION_FACTORS.transport.cycling} kg/km)`)
              ],
              activeTab === 'food' && [
                React.createElement('option', { key: 'beef', value: 'beef' }, `Beef Meal (${EMISSION_FACTORS.food.beef} kg/serving)`),
                React.createElement('option', { key: 'chicken', value: 'chicken' }, `Chicken/Poultry (${EMISSION_FACTORS.food.chicken} kg/serving)`),
                React.createElement('option', { key: 'vegetarian', value: 'vegetarian' }, `Vegetarian Meal (${EMISSION_FACTORS.food.vegetarian} kg/serving)`),
                React.createElement('option', { key: 'vegan', value: 'vegan' }, `Vegan/Plant-based (${EMISSION_FACTORS.food.vegan} kg/serving)`)
              ],
              activeTab === 'energy' && [
                React.createElement('option', { key: 'electricity', value: 'electricity' }, `Electricity Usage (${EMISSION_FACTORS.energy.electricity} kg/kWh)`),
                React.createElement('option', { key: 'gas', value: 'gas' }, `Gas Heating (${EMISSION_FACTORS.energy.gas} kg/therm)`)
              ],
              activeTab === 'shopping' && [
                React.createElement('option', { key: 'clothing', value: 'clothing' }, `New Clothing Item (${EMISSION_FACTORS.shopping.clothing} kg/item)`),
                React.createElement('option', { key: 'electronics', value: 'electronics' }, `Electronics Device (${EMISSION_FACTORS.shopping.electronics} kg/item)`),
                React.createElement('option', { key: 'secondhand', value: 'secondhand' }, `Secondhand Item (${EMISSION_FACTORS.shopping.secondhand} kg/item)`)
              ]
            )
          ),

          /* Quantity Input */
          React.createElement(
            'div',
            { className: 'form-group' },
            React.createElement(
              'label', 
              { className: 'form-label', htmlFor: 'act-quantity' }, 
              activeTab === 'transport' ? 'Distance (km)' :
              activeTab === 'food' ? 'Servings (meals)' :
              activeTab === 'energy' && type === 'electricity' ? 'Power Used (kWh)' :
              activeTab === 'energy' && type === 'gas' ? 'Gas Volume (therms)' :
              'Quantity (items)'
            ),
            React.createElement('input', {
              id: 'act-quantity',
              type: 'text',
              className: 'form-input',
              placeholder: 'e.g. 15',
              value: quantityStr,
              onChange: handleQuantityChange
            }),
            error && React.createElement('div', { className: 'field-error' }, error),
            warning && React.createElement('div', { className: 'field-warning' }, warning)
          ),

          /* Note Field */
          React.createElement(
            'div',
            { className: 'form-group' },
            React.createElement('label', { className: 'form-label', htmlFor: 'act-note' }, 'Optional Note'),
            React.createElement('input', {
              id: 'act-note',
              type: 'text',
              className: 'form-input',
              placeholder: 'e.g. Commute to office',
              value: note,
              onChange: (e) => setNote(e.target.value)
            })
          ),

          React.createElement(
            'button',
            { type: 'submit', className: 'btn btn-primary', style: { width: '100%', marginTop: '8px' } },
            'Log Activity'
          )
        )
      );
    }

    /**
     * History list container.
     */
    function ActivityHistoryList({ activities, onDelete }) {
      return React.createElement(
        'div',
        { className: 'glass-card', style: { display: 'flex', flexDirection: 'column', gap: '16px' } },
        React.createElement('h3', { style: { fontSize: '1.2rem' } }, 'Activity Logs'),
        activities.length === 0 ? React.createElement(
          'p',
          { style: { color: 'var(--text-secondary)', fontSize: '0.9rem', textAlign: 'center', padding: '20px 0' } },
          'No activity logs found for this date.'
        ) : React.createElement(
          'div',
          { style: { display: 'flex', flexDirection: 'column', gap: '12px', maxHeight: '320px', overflowY: 'auto', paddingRight: '4px' } },
          activities.map(act => {
            let catColor = 'var(--color-transport)';
            let icon = '🚗';
            if (act.category === 'food') { catColor = 'var(--color-food)'; icon = '🥗'; }
            if (act.category === 'energy') { catColor = 'var(--color-energy)'; icon = '⚡'; }
            if (act.category === 'shopping') { catColor = 'var(--color-shopping)'; icon = '🛍️'; }

            return React.createElement(
              'div',
              { 
                key: act.id,
                style: { 
                  display: 'flex', 
                  justifyContent: 'space-between', 
                  alignItems: 'center', 
                  padding: '10px 12px', 
                  background: 'rgba(255, 255, 255, 0.02)',
                  border: '1px solid rgba(255, 255, 255, 0.05)',
                  borderRadius: '10px'
                } 
              },
              React.createElement(
                'div',
                { style: { display: 'flex', alignItems: 'center', gap: '12px' } },
                React.createElement(
                  'span', 
                  { 
                    style: { 
                      display: 'flex', 
                      alignItems: 'center', 
                      justifyContent: 'center', 
                      width: '36px', 
                      height: '36px', 
                      borderRadius: '8px', 
                      background: `rgba(${catColor === 'var(--color-transport)' ? '56, 189, 248' : catColor === 'var(--color-food)' ? '251, 113, 133' : catColor === 'var(--color-energy)' ? '251, 191, 36' : '192, 132, 252'}, 0.1)`,
                      color: catColor
                    } 
                  },
                  icon
                ),
                React.createElement(
                  'div',
                  { style: { display: 'flex', flexDirection: 'column' } },
                  React.createElement(
                    'span', 
                    { style: { fontSize: '0.85rem', fontWeight: '600', textTransform: 'capitalize' } }, 
                    `${act.type} (${act.quantity} ${act.category === 'transport' ? 'km' : act.category === 'food' ? 'meals' : act.category === 'energy' ? (act.type === 'electricity' ? 'kWh' : 'therms') : 'items'})`
                  ),
                  act.note && React.createElement('span', { style: { fontSize: '0.75rem', color: 'var(--text-secondary)' } }, act.note)
                )
              ),
              React.createElement(
                'div',
                { style: { display: 'flex', alignItems: 'center', gap: '12px' } },
                React.createElement('span', { style: { fontSize: '0.85rem', fontWeight: '700' } }, `${act.emissions.toFixed(1)} kg`),
                React.createElement(
                  'button',
                  { 
                    className: 'btn btn-danger', 
                    style: { padding: '4px 8px', fontSize: '0.75rem', borderRadius: '6px' },
                    onClick: () => onDelete(act.id)
                  },
                  'Delete'
                )
              )
            );
          })
        )
      );
    }

    // ==========================================
    // MAIN APP ENTRY CONTAINER
    // ==========================================

    function App() {
      const [state, dispatch] = useReducer(carbonReducer, INITIAL_STATE, loadAndSanitizeState);
      const [selectedDate, setSelectedDate] = useState(() => new Date().toISOString().split('T')[0]);

      // Handle onboarding submissions
      const handleOnboardingSubmit = (profileData) => {
        dispatch({ type: 'COMPLETE_ONBOARDING', payload: profileData });
      };

      // Reset application states
      const handleReset = () => {
        if (confirm('Are you sure you want to delete all activity history and profile settings?')) {
          dispatch({ type: 'RESET_ALL' });
        }
      };

      // Handle logging logs
      const handleAddActivity = (activity) => {
        dispatch({ type: 'ADD_ACTIVITY', payload: activity });
      };

      // Handle deleting logs
      const handleDeleteActivity = (id) => {
        dispatch({ type: 'DELETE_ACTIVITY', payload: id });
      };

      // Produce rolling 7 days keys
      const datePills = useMemo(() => {
        const pills = [];
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        for (let i = 6; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          const dateStr = d.toISOString().split('T')[0];
          const isToday = i === 0;
          const isYesterday = i === 1;
          
          let label = isToday ? 'Today' : isYesterday ? 'Yesterday' : `${days[d.getDay()]} ${d.getDate()}`;
          pills.push({ date: dateStr, label });
        }
        return pills;
      }, []);

      // Filter activities for active day
      const dayActivities = useMemo(() => {
        return state.activities.filter(act => act.date === selectedDate);
      }, [state.activities, selectedDate]);

      // Category emission totals for the selected date
      const categoryTotals = useMemo(() => {
        const totals = { transport: 0, food: 0, energy: 0, shopping: 0 };
        dayActivities.forEach(act => {
          if (totals[act.category] !== undefined) {
            totals[act.category] += act.emissions;
          }
        });
        return totals;
      }, [dayActivities]);

      // Combined total for selected day
      const dailyTotal = useMemo(() => {
        return calculateDailyTotal(dayActivities);
      }, [dayActivities]);

      const passedCount = testResults.filter(r => r.pass).length;
      const totalCount = testResults.length;
      const allPassed = passedCount === totalCount;

      return React.createElement(
        'div',
        { style: { width: '100%' } },
        /* Onboarding Screen */
        !state.profile.onboardingCompleted && React.createElement(OnboardingOverlay, { onSubmit: handleOnboardingSubmit }),

        /* Application Layout */
        React.createElement(
          'div',
          { className: 'app-container' },
          
          /* Header Navigation bar */
          React.createElement(
            'header',
            { className: 'header' },
            React.createElement(
              'div',
              { className: 'header-logo' },
              React.createElement('span', { style: { fontSize: '2rem' } }, '🟢'),
              React.createElement('h1', { className: 'header-title' }, 'CarbonLens')
            ),
            React.createElement(
              'div',
              { style: { display: 'flex', alignItems: 'center', gap: '16px', flexWrap: 'wrap' } },
              React.createElement(
                'div',
                { className: 'date-selector' },
                datePills.map(pill => 
                  React.createElement(
                    'button',
                    {
                      key: pill.date,
                      className: `date-pill ${selectedDate === pill.date ? 'active' : ''}`,
                      onClick: () => setSelectedDate(pill.date)
                    },
                    pill.label
                  )
                )
              ),
              React.createElement(
                'button',
                { className: 'btn btn-secondary btn-danger', onClick: handleReset },
                'Reset'
              )
            )
          ),

          /* Dashboard Grid Layout */
          React.createElement(
            'main',
            { className: 'grid-layout' },
            
            /* Column 1: Daily Gauges */
            React.createElement(
              'div',
              { style: { display: 'flex', flexDirection: 'column', gap: '24px' } },
              React.createElement(FootprintGauge, { value: dailyTotal, target: GLOBAL_BENCHMARKS.total }),
              React.createElement(CategoryDonutChart, { data: categoryTotals })
            ),

            /* Column 2: Inputs & History */
            React.createElement(
              'div',
              { style: { display: 'flex', flexDirection: 'column', gap: '24px' } },
              React.createElement(ActivityForm, { onAdd: handleAddActivity, selectedDate: selectedDate }),
              React.createElement(ActivityHistoryList, { activities: dayActivities, onDelete: handleDeleteActivity })
            ),

            /* Column 3: Analytics & Tips */
            React.createElement(
              'div',
              { style: { display: 'flex', flexDirection: 'column', gap: '24px' } },
              React.createElement(WeeklySparkline, { dailyHistory: state.dailyHistory }),
              React.createElement(InsightsPanel, { activities: state.activities })
            )
          )
        ),

        /* Self-Contained Test Results Panel */
        React.createElement(
          'details',
          {
            id: 'test-results-panel',
            style: {
              position: 'fixed',
              bottom: '16px',
              right: '16px',
              background: 'rgba(15, 23, 42, 0.95)',
              border: `1px solid ${allPassed ? '#10b981' : '#ef4444'}`,
              borderRadius: '8px',
              padding: '12px',
              width: '300px',
              maxHeight: '300px',
              overflowY: 'auto',
              zIndex: 10000,
              boxShadow: '0 4px 20px rgba(0, 0, 0, 0.5)',
              fontSize: '0.85rem',
              fontFamily: 'var(--font-sans)',
              color: 'var(--text-primary)'
            }
          },
          React.createElement(
            'summary',
            {
              style: {
                fontWeight: 'bold',
                cursor: 'pointer',
                color: allPassed ? '#34d399' : '#f87171',
                outline: 'none'
              }
            },
            `🧪 Tests: ${passedCount}/${totalCount} passed`
          ),
          React.createElement(
            'div',
            { style: { marginTop: '8px', display: 'flex', flexDirection: 'column', gap: '6px' } },
            testResults.map((res, idx) => 
              React.createElement(
                'div',
                { key: idx, style: { borderBottom: '1px solid rgba(255, 255, 255, 0.05)', paddingBottom: '4px' } },
                React.createElement(
                  'span',
                  { style: { color: res.pass ? '#34d399' : '#f87171', fontWeight: '500' } },
                  `${res.pass ? '✅ PASS' : '❌ FAIL'}: ${res.name}`
                ),
                res.error && React.createElement(
                  'span',
                  { style: { color: '#fca5a5', fontSize: '0.75rem', display: 'block', paddingLeft: '10px' } },
                  res.error
                )
              )
            )
          )
        )
      );
    }

    // Run tests automatically on load
    const testResults = runTests();

    // Mount App
    const container = document.getElementById('root');
    const root = createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
